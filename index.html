    <!-- 主题初始化脚本 - 在 React 加载前执行，避免闪烁 -->
    <script>
      (function() {
        var theme = localStorage.getItem('hsmkit-theme');
        if (!theme) {
          theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (theme === 'dark') {
          document.body.classList.add('dark-mode');
          document.body.style.backgroundColor = '#141414';
          document.documentElement.style.setProperty('--bg-color', '#141414');
        } else {
          document.body.style.backgroundColor = '#f8f9fb';
          document.documentElement.style.setProperty('--bg-color', '#f8f9fb');
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <!-- 一次性迁移：清除旧 Service Worker 和缓存 -->
    <script>
      (function() {
        if ('serviceWorker' in navigator && !localStorage.getItem('sw-clean-v2')) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length > 0) {
              for (var i = 0; i < regs.length; i++) { regs[i].unregister(); }
              caches.keys().then(function(names) {
                for (var j = 0; j < names.length; j++) { caches.delete(names[j]); }
                localStorage.setItem('sw-clean-v2', '1');
                window.location.reload();
              });
            } else {
              localStorage.setItem('sw-clean-v2', '1');
            }
          });
        }
      })();
    </script>
